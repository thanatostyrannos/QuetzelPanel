# QuetzelPanel platform chart values.

# local  -> rely on k3s bundled ServiceLB / local-path / Traefik (this machine)
# prod   -> install.sh additionally bootstraps MetalLB/Longhorn/etc (stub, see CONFIG.md)
profile: local

# Install the GameServer CRD as part of the chart (kept on uninstall for data safety).
crd:
  install: true

image:
  # Default registry for published images. The per-component image defaults to
  # {registry}/quetzel-<component>:{Chart.appVersion} via the quetzel.image helper.
  registry: ghcr.io/thanatostyrannos
  pullPolicy: IfNotPresent

operator:
  # Blank => published GHCR image at appVersion. install.sh --local sets the local
  # quetzel/operator:<tag> build instead (offline dev / CI on a kind/k3d cluster).
  image: ""
  # Empty => watch the release namespace. Set to watch elsewhere.
  watchNamespace: ""
  resources:
    requests: { cpu: "50m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "256Mi" }

backend:
  image: ""
  replicas: 1
  provider: k8s            # in-cluster talks to real GameServer CRs
  # User/customer persistence: memory (default) | sqlite | postgres.
  userstore: memory
  dbPath: /data/quetzel.db  # used when userstore=sqlite
  service:
    port: 8000
  resources:
    requests: { cpu: "50m", memory: "128Mi" }
    limits: { cpu: "500m", memory: "256Mi" }

frontend:
  image: ""
  replicas: 1
  service:
    port: 80
  resources:
    requests: { cpu: "25m", memory: "64Mi" }
    limits: { cpu: "200m", memory: "128Mi" }

ingress:
  enabled: true
  className: traefik
  host: quetzel.localhost

# Authentication (WP-A). Disabled by default => mock/dev is permissive (no login
# wall). Enable + pass a JWT secret to turn on enforcement:
#   --set auth.enabled=true --set auth.jwtSecret=<random> [--set backend.userstore=sqlite]
auth:
  enabled: false
  jwtSecret: ""        # REQUIRED when auth.enabled=true (pass via --set, never commit)
  jwtAlgorithm: HS256
  jwtTtl: 3600
  google:
    clientId: ""       # optional "Sign in with Google"; pass clientId+clientSecret via --set
    clientSecret: ""
    # redirectUri defaults to https://<ingress.host>/api/auth/google/callback
  # Seed a platform-admin at startup (idempotent). Needed for API-driven tenant
  # seeding (and e2e/verify.sh) under enforced auth. Set password to activate.
  bootstrapAdmin:
    username: admin
    password: ""       # pass via --set auth.bootstrapAdmin.password=<secret>

# In-cluster Postgres for enterprise identity/tenancy. Disabled by default
# (local uses memory/sqlite). Enable for the enterprise profile.
postgres:
  enabled: false
  image: postgres:16-alpine
  database: quetzel
  username: quetzel
  password: ""         # REQUIRED when postgres.enabled=true (pass via --set)
  storageSize: 2Gi
  # storageClass: ""

# prod-profile prerequisites — wired but disabled locally (handled by install.sh, not this chart)
prod:
  metallb:
    enabled: false
    addressPool: "192.168.1.240-192.168.1.250"
  longhorn:
    enabled: false
  ingressNginx:
    enabled: false
  certManager:
    enabled: false
  monitoring:
    enabled: false
