# Enterprise / prod profile overrides.
#   helm install quetzel charts/quetzel -f charts/quetzel/values-enterprise.yaml
#
# This profile targets a real multi-node cluster: published GHCR images (no local
# build), persistent identity/tenancy storage (Postgres, added by WP-A), and the
# prod prerequisite toggles. Local dev keeps using the default values.yaml.
profile: enterprise

backend:
  replicas: 2
  provider: k8s
  # userstore=postgres when postgres.enabled=true; else memory (mock mode)
  userstore: postgres

operator:
  resources:
    requests: { cpu: "100m", memory: "192Mi" }
    limits: { cpu: "1", memory: "512Mi" }

# Auth (WP-A) — override at install time; never commit real secrets.
auth:
  enabled: true
  # jwtSecret: <set via --set auth.jwtSecret=... at helm install time>
  jwtAlgorithm: HS256
  jwtTtl: 3600
  google:
    # clientId: <set via --set auth.google.clientId=...>
    # clientSecret: <set via --set auth.google.clientSecret=...>
    # redirectUri: defaults to https://<ingress.host>/api/auth/google/callback

# In-cluster Postgres (enterprise only). Disable to use an external DB.
postgres:
  enabled: true
  image: postgres:16-alpine
  database: quetzel
  username: quetzel
  # password: <set via --set postgres.password=... at install time>
  storageSize: 10Gi
  # storageClass: longhorn  # uncomment for Longhorn in prod

# Prod prerequisites — installed/managed out-of-band (install.sh PROFILE=prod),
# declared here so the enterprise render is explicit about what it expects.
prod:
  metallb:
    enabled: false
  longhorn:
    enabled: false
  ingressNginx:
    enabled: false
  certManager:
    enabled: false
  monitoring:
    enabled: false
