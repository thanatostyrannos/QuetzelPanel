{{- if ((.Values.auth).enabled) }}
# auth-secret.yaml — WP-A: JWT signing key + Google OIDC credentials.
# Mount into the backend Deployment via envFrom (see SEAM_REQUESTS.md).
# NEVER put real values in values.yaml — pass them at install time:
#   helm install quetzel charts/quetzel \
#     --set auth.jwtSecret=<your-secret> \
#     --set auth.google.clientId=<id> \
#     --set auth.google.clientSecret=<secret>
apiVersion: v1
kind: Secret
metadata:
  name: quetzel-auth
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quetzel.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "auth.jwtSecret must be set when auth.enabled=true" .Values.auth.jwtSecret | quote }}
  JWT_ALGORITHM: {{ .Values.auth.jwtAlgorithm | default "HS256" | quote }}
  JWT_TTL: {{ .Values.auth.jwtTtl | default 3600 | toString | quote }}
  {{- with (.Values.auth).bootstrapAdmin }}
  {{- if .password }}
  QUETZEL_BOOTSTRAP_ADMIN_USER: {{ .username | default "admin" | quote }}
  QUETZEL_BOOTSTRAP_ADMIN_PASSWORD: {{ .password | quote }}
  {{- end }}
  {{- end }}
  {{- if ((.Values.auth).google).clientId }}
  GOOGLE_CLIENT_ID: {{ .Values.auth.google.clientId | quote }}
  GOOGLE_CLIENT_SECRET: {{ required "auth.google.clientSecret required when clientId is set" .Values.auth.google.clientSecret | quote }}
  GOOGLE_REDIRECT_URI: {{ .Values.auth.google.redirectUri | default (printf "https://%s/api/auth/google/callback" .Values.ingress.host) | quote }}
  {{- end }}
{{- end }}
