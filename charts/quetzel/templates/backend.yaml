apiVersion: apps/v1
kind: Deployment
metadata:
  name: quetzel-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quetzel.labels" . | nindent 4 }}
    {{- include "quetzel.selectorLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
spec:
  replicas: {{ .Values.backend.replicas }}
  selector:
    matchLabels:
      {{- include "quetzel.selectorLabels" (dict "ctx" . "component" "backend") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "quetzel.labels" . | nindent 8 }}
        {{- include "quetzel.selectorLabels" (dict "ctx" . "component" "backend") | nindent 8 }}
    spec:
      serviceAccountName: quetzel-backend
      containers:
        - name: backend
          image: {{ include "quetzel.image" (dict "ctx" . "component" "backend") }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: QUETZEL_PROVIDER
              value: {{ .Values.backend.provider | quote }}
            - name: QUETZEL_NAMESPACE
              value: {{ .Release.Namespace | quote }}
            - name: QUETZEL_USERSTORE
              value: {{ .Values.backend.userstore | default "memory" | quote }}
            - name: QUETZEL_DB_PATH
              value: {{ .Values.backend.dbPath | default "/data/quetzel.db" | quote }}
          {{- if or ((.Values.auth).enabled) ((.Values.postgres).enabled) }}
          envFrom:
            {{- if ((.Values.auth).enabled) }}
            - secretRef:
                name: quetzel-auth
            {{- end }}
            {{- if and ((.Values.auth).enabled) ((.Values.postgres).enabled) }}
            - secretRef:
                name: quetzel-postgres-credentials
            {{- end }}
          {{- end }}
          ports:
            - name: http
              containerPort: 8000
          readinessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 10
            periodSeconds: 15
          resources:
            {{- toYaml .Values.backend.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: quetzel-backend
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "quetzel.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "quetzel.selectorLabels" (dict "ctx" . "component" "backend") | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: http
