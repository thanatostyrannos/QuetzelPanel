# Serves the built SPA and reverse-proxies the API to the backend Service.
# The /api/ prefix is stripped (trailing slash on proxy_pass) so the backend
# receives /games, /servers, ... — matching its routes and the dev-proxy rewrite.
server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://quetzel-backend:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 60s;
    }

    # SPA fallback: client-side routes resolve to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
