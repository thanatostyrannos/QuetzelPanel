name: Game Images

# Build + push baked game-server images (server jar fetched at BUILD time so pods
# never hit upstream CDNs at runtime). Matrix is driven by deploy/game-versions.json.
on:
  push:
    branches: [main]
    paths:
      - game-images/**
      - deploy/game-versions.json
      - .github/workflows/game-images.yml
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
      repo: ${{ steps.gen.outputs.repo }}
      javaTag: ${{ steps.gen.outputs.javaTag }}
    steps:
      - uses: actions/checkout@v4
      - id: gen
        run: |
          versions=$(jq -c '.minecraft.versions' deploy/game-versions.json)
          echo "matrix={\"version\":$versions}" >> "$GITHUB_OUTPUT"
          echo "repo=$(jq -r '.minecraft.imageRepo' deploy/game-versions.json)" >> "$GITHUB_OUTPUT"
          echo "javaTag=$(jq -r '.minecraft.javaTag' deploy/game-versions.json)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Resolve server jar url + sha1
        id: jar
        run: |
          read -r url sha < <(python game-images/mc_versions.py resolve "${{ matrix.version }}")
          test -n "$url" || { echo "no jar for ${{ matrix.version }}"; exit 1; }
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "sha1=$sha" >> "$GITHUB_OUTPUT"
      - name: Build + push baked image
        uses: docker/build-push-action@v6
        with:
          context: game-images/minecraft
          push: true
          platforms: linux/amd64
          build-args: |
            JAVA_TAG=${{ needs.prepare.outputs.javaTag }}
            MC_VERSION=${{ matrix.version }}
            SERVER_URL=${{ steps.jar.outputs.url }}
            SERVER_SHA1=${{ steps.jar.outputs.sha1 }}
          tags: ${{ needs.prepare.outputs.repo }}:${{ matrix.version }}
          cache-from: type=gha,scope=game-mc-${{ matrix.version }}
          cache-to: type=gha,mode=max,scope=game-mc-${{ matrix.version }}
