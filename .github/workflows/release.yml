name: Release

# Artifacts are produced on acceptance to main (a merged PR), never from a dev box.
# A v<version> tag cuts an immutable, semver-tagged release.
on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  images:
    name: images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        component: [operator, backend, frontend]
    outputs:
      operator-digest: ${{ steps.export.outputs.operator }}
      backend-digest: ${{ steps.export.outputs.backend }}
      frontend-digest: ${{ steps.export.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - name: Compute vars (owner lower-case, chart appVersion)
        run: |
          echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
          APPVERSION=$(grep '^appVersion:' charts/quetzel/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "APPVERSION=$APPVERSION" >> "$GITHUB_ENV"
      - uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ env.OWNER }}/quetzel-${{ matrix.component }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,format=long
            type=semver,pattern={{version}}
            type=raw,value=${{ env.APPVERSION }}
      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.component }}/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
      - name: Export digest
        id: export
        run: echo "${{ matrix.component }}=${{ steps.build.outputs.digest }}" >> "$GITHUB_OUTPUT"

  chart:
    name: chart
    needs: images
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.pkg.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.2
      - name: Compute owner (lower-case)
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Log in to GHCR (helm registry)
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
      - name: helm package
        id: pkg
        run: |
          helm package charts/quetzel -d dist
          VERSION=$(grep '^version:' charts/quetzel/Chart.yaml | awk '{print $2}' | tr -d '"')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
      - name: helm push (OCI)
        run: helm push "dist/quetzel-${{ steps.pkg.outputs.version }}.tgz" "oci://ghcr.io/${{ env.OWNER }}/charts"
      - name: Upload chart artifact
        uses: actions/upload-artifact@v4
        with:
          name: chart
          path: dist/*.tgz

  release:
    name: release
    needs: [images, chart]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Compute owner (lower-case)
        run: echo "OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"
      - name: Download chart artifact
        uses: actions/download-artifact@v4
        with:
          name: chart
          path: dist
      - name: Compose release notes
        run: |
          cat > notes.md <<EOF
          ## QuetzelPanel ${{ needs.chart.outputs.version }}

          Container images (\`ghcr.io/${OWNER}/...\`):

          | image | digest |
          |-------|--------|
          | quetzel-operator | \`${{ needs.images.outputs.operator-digest }}\` |
          | quetzel-backend  | \`${{ needs.images.outputs.backend-digest }}\` |
          | quetzel-frontend | \`${{ needs.images.outputs.frontend-digest }}\` |

          Helm chart (OCI): \`oci://ghcr.io/${OWNER}/charts/quetzel\` version \`${{ needs.chart.outputs.version }}\`

          \`\`\`sh
          helm install quetzel oci://ghcr.io/${OWNER}/charts/quetzel --version ${{ needs.chart.outputs.version }}
          \`\`\`
          EOF
      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.chart.outputs.version }}
          name: QuetzelPanel v${{ needs.chart.outputs.version }}
          body_path: notes.md
          files: dist/*.tgz
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
